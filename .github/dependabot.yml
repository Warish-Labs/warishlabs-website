# GitHub Dependabot Configuration File
# Configured for npm ecosystem to manage security vulnerabilities and package updates.

version: 2

updates:
  # Configuration for npm package manager
  - package-ecosystem: "npm"
    
    # Root directory containing package.json and package-lock.json
    directory: "/"
    
    # Schedule weekly checks on Monday mornings
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00" # UTC morning time
      timezone: "UTC"
      
    # Group all npm updates into a single consolidated Pull Request to reduce noise
    groups:
      npm-dependencies:
        patterns:
          - "*" # Match all packages
          
    # Limit maximum open pull requests from Dependabot to 3
    open-pull-requests-limit: 3
    
    # Customize commits generated by Dependabot
    commit-message:
      prefix: "chore" # Set commit prefix to match conventional commits (e.g. chore(deps): ...)
      include: "scope"
