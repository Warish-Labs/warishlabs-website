name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/warishlabs"
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: "0x4AAAAAADsxz5P51f_8YIzF"
      TURNSTILE_SECRET_KEY: "0x4AAAAAADsxz-HxuOKAZFRRmbjVTyO18tQ"
      NEXT_PUBLIC_ADMIN_EMAIL: "warishlabs@gmail.com"
      CLERK_SECRET_KEY: "sk_test_mock"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_mock"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test --if-present

      - name: Build application
        run: npm run build
